<!DOCTYPE html>
<html>
<head>
<title>Desk Selection</title>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0b1120;
    color: #f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin: 0;
}
.container {
    text-align:center;
    background: #0f172a;
    padding: 40px;
    border-radius: 4px;
    border: 1px solid #1e293b;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
h2 {
    margin-top: 0;
    color: #e2e8f0;
    font-weight: 500;
}
button {
    padding:12px 24px;
    margin:10px;
    font-size:14px;
    cursor:pointer;
    background: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
}
button:hover {
    background: #334155;
    border-color: #475569;
}
</style>
</head>

<body>

<div class="container">
    <h2>Select Desk</h2>

    <button onclick="goDesk('MO')">MO Desk</button>
    <button onclick="goDesk('CONFIRMATION')">Confirmation Desk</button>
    <button onclick="goDesk('SETTLEMENT')">Settlement Desk</button>
</div>

<script>
// Cookie helper
function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : null;
}

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get("userId");

// Verify we have auth
if (!userId || !getCookie("auth_token")) {
    alert("Session expired. Login again.");
    window.location.href = "/";
}

function goDesk(desk){
    window.location.href = "/workstation.html?userId=" + encodeURIComponent(userId) + "&desk=" + encodeURIComponent(desk);
}
</script>

</body>
</html>
