<!DOCTYPE html>
<html>

<head>
<title>Trade Workstation</title>

<style>
body{
font-family: Arial;
background:#F5F7FA;
margin:0;
}

.topbar{
background:#0B1F3A;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.clock{ font-size:14px; }

.container{ width:96%; margin:20px auto; }

.blotter{
background:white;
padding:10px;
display:flex;
gap:20px;
border-radius:6px;
font-size:13px;
flex-wrap:wrap;
}

.blotter div{
min-width:120px;
}

.main{
display:grid;
grid-template-columns:1fr 1.3fr;
gap:20px;
margin-top:20px;
}

.panel{
background:white;
padding:15px;
border-radius:6px;
margin-bottom:15px;
}

.mail-box{
background:white;
border-radius:6px;
display:flex;
flex-direction:column;
height:520px;
}

.mail-header{
background:#1E3A5F;
color:white;
padding:10px;
}

.mail-body{
flex:1;
display:flex;
}

.mail-list{
width:40%;
border-right:1px solid #eee;
overflow:auto;
}

.mail-item{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.mail-view{
flex:1;
padding:10px;
overflow:auto;
}

.compose{
border-top:1px solid #eee;
padding:10px;
}

textarea{ width:100%; height:70px; }

.action-btn{
background:#0B1F3A;
color:white;
padding:10px;
margin:5px;
cursor:pointer;
}

.back-btn{
background:#FFC107;
padding:10px;
border:none;
cursor:pointer;
margin-bottom:10px;
}
</style>

<script>

const USER_ID = localStorage.getItem("userId");
if (!USER_ID) {
    alert("User session missing. Go back to workstation.");
}

let trade=null;
let messages=[];

/* ===== HELPERS ===== */
function getDesk(){
  return localStorage.getItem("currentDesk");
}

/* ===== CLOCK ===== */
function startClock(){
    setInterval(async ()=>{
        try{
            const res = await fetch("/api/clock");
            const data = await res.json();

            const el = document.getElementById("clock");
            if(el){
                el.innerText = "Sim Time: " + data.operationalTimeET + " (EST)";
            }
        }catch(err){
            console.error("Clock error:", err);
        }
    },1000);
}

/* ===== NAV ===== */
function goBack(){
    const desk = getDesk();
    if(desk==="MO") window.location.href="/mo.html";
    if(desk==="CONFIRMATION") window.location.href="/confirmation.html";
}

/* ===== SAFE LOAD TRADE ===== */
function loadTrade(){

    const saved = localStorage.getItem("selectedTrade");

    if(!saved){
        alert("No trade selected");
        return;
    }

    try{
        trade = JSON.parse(saved);
    }catch(err){
        console.error("Invalid trade in storage", err);
        alert("Invalid trade data");
        return;
    }

    if(!trade || !trade.tradeRef){
        alert("Invalid trade object");
        return;
    }

    renderTrade();
    renderActions();
    loadAudit();
    loadConversation();
}

/* ===== BLOTTER ===== */
function renderTrade(){

document.getElementById("blotter").innerHTML=`

<div><small>Trade Ref</small><br><b>${trade.tradeRef}</b></div>
<div><small>Counterparty</small><br>${trade.counterparty || "-"}</div>
<div><small>CCY</small><br>${trade.currency}</div>
<div><small>Amount</small><br>${trade.amount}</div>
<div><small>Direction</small><br>${trade.direction}</div>
<div><small>Product</small><br>${trade.product}</div>
<div><small>Entity</small><br>${trade.entity || "-"}</div>
<div><small>Status</small><br>${trade.currentStatus}</div>
<div><small>Value Date</small><br>${trade.valueDate ? new Date(trade.valueDate).toLocaleDateString() : "-"}</div>

`;
}

/* ===== ACTION BUTTONS ===== */
function renderActions(){

  const desk = getDesk();
  const panel = document.getElementById("actionPanel");

  if(desk==="MO"){
    panel.innerHTML = `
      <button class="action-btn" onclick="executeAction('MO_VALIDATE_PASS')">Validate</button>
      <button class="action-btn" onclick="executeAction('MO_RAISE_BREAK')">Raise Break</button>
      <button class="action-btn" onclick="executeAction('MO_RESOLVE_BREAK')">Resolve Break</button>
    `;
  }

  if(desk==="CONFIRMATION"){
    panel.innerHTML = `
      <button class="action-btn" onclick="executeAction('CONFIRM_TRADE')">Confirm</button>
      <button class="action-btn" onclick="executeAction('CONFIRM_RAISE_BREAK')">Confirmation Break</button>
      <button class="action-btn" onclick="executeAction('CONFIRM_RESOLVE_BREAK')">Break Resolved</button>
    `;
  }
}

/* ===== UPDATE QUEUE ===== */
function updateQueue(updatedTrade){

  const desk = getDesk();
  let key = desk === "MO" ? "MO_QUEUE" : "CONF_QUEUE";

  let queue = JSON.parse(localStorage.getItem(key)) || [];

  queue = queue.map(t =>
      t.tradeRef === updatedTrade.tradeRef ? updatedTrade : t
  );

  localStorage.setItem(key, JSON.stringify(queue));
}

/* ===== ACTION ===== */
async function executeAction(action){

    try{

        const res = await fetch("/api/trade/action",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                trade,
                action,
                userId: USER_ID
            })
        });

        const data = await res.json();

        if(!data.success){
            console.error("Action failed:", data);
            alert(data.error || "Action failed");
            return;
        }

        if(!data.trade) return;

        trade = data.trade;

        updateQueue(trade);

        renderTrade();
        loadAudit();

    }catch(err){
        console.error("Action error:", err);
        alert("Something went wrong");
    }
}

/* ===== AUDIT ===== */
async function loadAudit(){

    try{
        const res=await fetch("/api/audit/"+trade.tradeRef);
        const data=await res.json();

        const box=document.getElementById("audit");
        box.innerHTML="";

        data.forEach(a=>{
            const div=document.createElement("div");
            div.innerText = a.action || a.event;
            box.appendChild(div);
        });

    }catch(err){
        console.error("Audit error:", err);
    }
}

/* ===== EMAIL ===== */
async function loadConversation(){

    try{
        const res=await fetch("/api/conversation/"+trade.tradeRef);
        messages=await res.json();
        renderMailList();
    }catch(err){
        console.error("Conversation error:", err);
    }
}

function renderMailList(){

    const list=document.getElementById("mailList");
    list.innerHTML="";

    messages.forEach(m=>{

        const time = m.timestamp 
        ? new Date(m.timestamp).toLocaleTimeString() 
        : "";

        const senderLabel =
        m.sender === "CONFIRMATION" ? "Broker / CPTY" :
        m.sender === "MO" ? "Front Office" :
        m.sender;

        const div=document.createElement("div");
        div.className="mail-item";
        div.innerHTML = `
        <b>${senderLabel}</b><br>
        <small>${m.subject}</small><br>
        <small style="color:gray">${time}</small>
        `;

        div.onclick = ()=> renderMail(m);

        list.appendChild(div);
    });
}

function renderMail(m){

    const time = m.timestamp 
    ? new Date(m.timestamp).toLocaleString() 
    : "";

    document.getElementById("mailView").innerHTML = `
    <b>${m.sender}</b><br>
    <small style="color:gray">${time}</small>
    <hr>
    ${m.body}
    `;
}

async function sendEmail(){

    const body=document.getElementById("emailBody").value;

    if(!body) return;

    try{

        await fetch("/api/conversation/send",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                tradeRef:trade.tradeRef,
                sender:getDesk(),
                subject:"Query",
                body
            })
        });

        document.getElementById("emailBody").value="";
        loadConversation();

    }catch(err){
        console.error("Email send error:", err);
    }
}

/* ===== INIT ===== */
window.onload=()=>{
    startClock();
    loadTrade();
};

</script>

</head>

<body>

<div class="topbar">
<div>Trade Workstation</div>
<div class="clock" id="clock"></div>
</div>

<div class="container">

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="blotter" id="blotter"></div>

<div class="main">

<div>

<div class="panel">
<h3>Actions</h3>
<div id="actionPanel"></div>
</div>

<div class="panel">
<h3>Audit Trail</h3>
<div id="audit"></div>
</div>

</div>

<div class="mail-box">

<div class="mail-header">Communication</div>

<div class="mail-body">

<div class="mail-list" id="mailList"></div>

<div class="mail-view" id="mailView">Select email</div>

</div>

<div class="compose">
<textarea id="emailBody"></textarea>
<button onclick="sendEmail()">Send</button>
</div>

</div>

</div>

</div>

</body>
</html>
