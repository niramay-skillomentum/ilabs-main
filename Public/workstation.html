<!DOCTYPE html>
<html>
<head>
<title>Operations Workstation</title>

<style>
body{
    font-family: Arial;
    background:#F5F7FA;
    margin:0;
}

.topbar{
    padding:15px 25px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.clock{ font-size:13px; }

.container{
    width:98%;
    margin:15px auto;
}

/* TABLE */
.table-container{
    height:520px;
    overflow:auto;
    background:white;
    border-radius:6px;
}

table{
    border-collapse:collapse;
    width:100%;
    min-width:1500px;
}

th{
    position:sticky;
    top:0;
    background:#0B1F3A;
    color:white;
    padding:8px;
    font-size:12px;
}

td{
    padding:8px;
    border-bottom:1px solid #eee;
    font-size:12px;
}

/* STATES */
.break-row{ background:#fff3cd; }
.pending-row{ background:#e6f0ff; }
.aged-row{ background:#ffe6e6; }

/* ACTION BAR */
.action-bar{
    background:white;
    padding:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    border-radius:6px;
    flex-wrap:wrap;
}

.btn{
    padding:8px 12px;
    margin:4px;
    border:none;
    cursor:pointer;
    font-size:12px;
}

.primary{ background:#0B1F3A; color:white; }
.secondary{ background:#0B1F3A; color:white; }
.warning{ background:#FFC107; }

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:6px;
    width:400px;
    display:none;
    z-index:999;
}

.popup textarea{
    width:100%;
    height:80px;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:998;
}
</style>
</head>

<body>

<div class="topbar" id="topbar">
    <div id="deskTitle">Workstation</div>
    <div>
        <button class="btn warning" onclick="refreshQueue()">Refresh</button>
        <span class="clock" id="clock"></span>
        <button class="btn secondary" onclick="logout()">Logoff</button>
    </div>
</div>

<div class="container">

<button class="btn warning" onclick="generateQueue()">Generate Queue</button>

<div class="table-container">
<table>
<thead>
<tr>
<th>Select</th>
<th>Trade Ref</th>
<th>Status</th>
<th>Next Desk</th>
<th>Age</th>
<th>Trade Date</th>
<th>Value Date</th>
<th>Counterparty</th>
<th>Entity</th>
<th>FO Region</th>
<th>Product</th>
<th>Trade Type</th>
<th>Settlement Type</th>
<th>Direction</th>
<th>Currency</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="action-bar">

<div id="deskActions"></div>

<div>
<button class="btn secondary" onclick="downloadCSV()">Download Excel</button>
<button class="btn secondary" onclick="openEmail()">Send Email</button>
<button class="btn secondary" onclick="openAudit()">Audit</button>
<button class="btn secondary" onclick="openSearch()">Search</button>
<button class="btn secondary" onclick="openMailbox()">Mail</button>
<button class="btn secondary" onclick="simulateFO()">SIMULATE</button>
</div>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="actionPopup">
<h3 id="actionTitle"></h3>
<div id="nextState"></div>
<textarea id="comment" placeholder="Add comment (recommended for audit & scoring)"></textarea>
<br><br>
<button onclick="submitAction()">Submit</button>
<button onclick="closePopup()">Cancel</button>
</div>

<div class="popup" id="emailPopup">
<h3>Send Email</h3>
<textarea id="emailText"></textarea>
<br><br>
<button onclick="sendEmail()">Send</button>
<button onclick="closePopup()">Cancel</button>
</div>

<div class="popup" id="auditPopup">
<h3>Audit</h3>
<div id="auditContent"></div>
<button onclick="closePopup()">Close</button>
</div>

<div class="popup" id="searchPopup">
<h3>Search</h3>
<input id="searchInput">
<button>Search</button>
<div id="searchResults"></div>
<button onclick="closePopup()">Close</button>
</div>

<script>

let selectedTrade = null;
let queue = [];
const userId = localStorage.getItem("userId");
const desk = localStorage.getItem("desk");
if(!desk){
    alert("Select desk first");
    window.location.href = "/dashboard.html";
}
if(!userId){
    alert("Session expired. Login again.");
    window.location.href = "/";
}

/* CLOCK */
setInterval(async () => {

    const res = await fetch("/api/clock");
    const data = await res.json();

    document.getElementById("clock").innerText = data.simTime;

    handleAlerts(data);

}, 1000);

/* THEME */
const themes = {
MO:"#0B1F3A",
CONFIRMATION:"#1E3A5F",
SETTLEMENT:"#3A1F1F"
};
document.getElementById("topbar").style.background = themes[desk];
document.getElementById("deskTitle").innerText = 
    desk + " Desk | Welcome, " + userId;
	
/* GENERATE */
async function generateQueue(){
    const res = await fetch("/api/queue/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({desk,userId})
    });
    const data = await res.json();

if(!data.success){
    alert(data.error || "Complete Your Current Trades First");
    return;
}

queue = data.trades || [];
render();
renderDeskActions();
}

/* REFRESH */
async function refreshQueue(){
    const res = await fetch("/api/queue/my?userId="+userId);
    const data = await res.json();
	alert("Queue refreshed");

if(!data.success){
    alert(data.error || "Unable to refresh queue");
    return;
}

queue = data.trades || [];
render();
renderDeskActions();
}

/* RENDER */
function render(){
    const body = document.getElementById("tableBody");
    body.innerHTML="";

    queue.forEach(t=>{
        const row = document.createElement("tr");

        if(t.currentStatus.includes("BREAK")) row.classList.add("break-row");
        if(t.currentStatus.includes("PENDING")) row.classList.add("pending-row");
        if(t.age>2) row.classList.add("aged-row");

        row.innerHTML=`
<td><input type="checkbox" onchange="selectTrade('${t.tradeRef}',this)"></td>
<td>${t.tradeRef}</td>
<td>${t.currentStatus}</td>
<td>${t.nextDesk}</td>
<td>${t.age}</td>
<td>${format(t.tradeDate)}</td>
<td>${format(t.valueDate)}</td>
<td>${t.counterparty}</td>
<td>${t.entity}</td>
<td>${t.foRegion}</td>
<td>${t.product}</td>
<td>${t.tradeType}</td>
<td>${t.settlementType}</td>
<td>${t.direction}</td>
<td>${t.currency}</td>
<td>${t.amount}</td>
`;

        body.appendChild(row);
    });
}

/* DESK ACTIONS */
function renderDeskActions(){
    const container = document.getElementById("deskActions");
    let html = "";

    if(desk === "MO"){
        html = `
        <button class="btn primary" onclick="openAction('MO_VALIDATE_PASS')">MO Validate</button>
        <button class="btn primary" onclick="openAction('MO_RAISE_BREAK')">MO Raise Break</button>
        <button class="btn primary" onclick="openAction('MO_SEND_TO_FO')">Send to FO</button>
        `;
    }

    if(desk === "CONFIRMATION"){
        html = `
        <button class="btn primary" onclick="openAction('CONFIRM_TRADE')">Confirm Trade</button>
        <button class="btn primary" onclick="openAction('CONFIRM_RAISE_BREAK')">Confirmation Break</button>
        <button class="btn primary" onclick="startCptyFlow()">Send to CPTY</button>
        <button class="btn primary" onclick="openAction('CONFIRM_SEND_BACK_TO_MO')">Send to MO</button>
        `;
    }

    if(desk === "SETTLEMENT"){
        html = `
        <button class="btn primary" onclick="openAction('SETTLEMENT_APPROVE')">Approve Settlement</button>
        <button class="btn primary" onclick="openAction('SETTLEMENT_RAISE_BREAK')">Setts Break</button>
        <button class="btn primary" onclick="openAction('SETTLEMENT_FOLLOW_UP_CPTY')">Follow-up</button>
        <button class="btn primary" onclick="openAction('SETTLEMENT_SEND_BACK_TO_MO')">Send to MO</button>
        `;
    }

    container.innerHTML = html;
}

/* SELECT */
function selectTrade(ref,cb){
    document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
    cb.checked=true;
    selectedTrade = queue.find(t=>t.tradeRef===ref);
}

/* FORMAT */
function format(d){
    if(!d) return "";
    return new Date(d).toLocaleDateString();
}

/*Logoff */
async function logout(){

    await fetch("/api/session/logout",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId})
    });

    localStorage.clear();
    window.location.href = "/";
}

/* ACTION SYSTEM */

const allowed = {
MO_VALIDATE_PASS:["MO_PENDING","MO_VALIDATION","PENDING_FO_RESPONSE"],
MO_RAISE_BREAK:["MO_PENDING","MO_VALIDATION"],
MO_SEND_TO_FO:["MO_BREAK_OPEN"],

CONFIRM_TRADE:["CONFIRMATION_PENDING"],
CONFIRM_RAISE_BREAK:["CONFIRMATION_PENDING"],
CONFIRM_SEND_TO_CPTY:["CONFIRMATION_PENDING"],
CONFIRM_SEND_BACK_TO_MO:["CONFIRMATION_BREAK"],

SETTLEMENT_APPROVE:["SETTLEMENT_PENDING"],
SETTLEMENT_RAISE_BREAK:["READY_FOR_APPROVAL"],
SETTLEMENT_FOLLOW_UP_CPTY:["SETTLEMENT_BREAK"]
};

let currentAction = null;

// =====================================================
// 🔒 STRICT FLOW: SEND TO CPTY (EMAIL REQUIRED)
// -----------------------------------------------------
// User must send email BEFORE lifecycle transition
// =====================================================
function startCptyFlow(){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    // Store action temporarily
    currentAction = "CONFIRM_SEND_TO_CPTY";

    // Open email popup
    document.getElementById("overlay").style.display="block";
    document.getElementById("emailPopup").style.display="block";

    document.getElementById("emailText").value = "";
}

function openAction(action){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    if(!allowed[action] || !allowed[action].includes(selectedTrade.currentStatus)){
        alert("Invalid action for current state");
        return;
    }

    currentAction = action;

    document.getElementById("actionTitle").innerText = action;
    document.getElementById("nextState").innerText = "Proceed?";
    document.getElementById("comment").value="";

    document.getElementById("overlay").style.display="block";
    document.getElementById("actionPopup").style.display="block";
}

async function submitAction(){

    const comment = document.getElementById("comment").value;
	
	if(!comment || comment.trim() === ""){
    console.warn("No comment provided - will be penalized in scoring");
}
    const res = await fetch("/api/trade/action",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            trade:selectedTrade,
            action:currentAction,
            userId,
            comment
        })
    });

    const data = await res.json();

    if(!data.success){
    alert(data.error || "Action failed");
    return;
}

queue = data.trades || [];
render();
renderDeskActions();

    closePopup();
}

function closePopup(){

    document.getElementById("overlay").style.display="none";

    document.getElementById("actionPopup").style.display="none";
    document.getElementById("emailPopup").style.display="none";
    document.getElementById("auditPopup").style.display="none";
    document.getElementById("searchPopup").style.display="none";
}

function openMailbox(){

    if(!selectedTrade){
        alert("Select trade first-communication is trade-specific");
        return;
    }

    localStorage.setItem("activeTradeRef", selectedTrade.tradeRef);

    window.open("/communication.html", "_blank");
}

function downloadCSV(){

    if(!queue || queue.length === 0){
        alert("No data to export");
        return;
    }

    const headers = [
        "Trade Ref","Status","Next Desk","Age",
        "Trade Date","Value Date",
        "Counterparty","Entity","FO Region",
        "Product","Trade Type","Settlement Type",
        "Direction","Currency","Amount"
    ];

    let csv = headers.join(",") + "\n";

    queue.forEach(t => {
        csv += [
            t.tradeRef,
            t.currentStatus,
            t.nextDesk,
            t.age,
            format(t.tradeDate),
            format(t.valueDate),
            t.counterparty,
            t.entity,
            t.foRegion,
            t.product,
            t.tradeType,
            t.settlementType,
            t.direction,
            t.currency,
            t.amount
        ].join(",") + "\n";
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "trade_queue.csv";
    a.click();

    window.URL.revokeObjectURL(url);
}

function openEmail(){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    document.getElementById("overlay").style.display="block";
    document.getElementById("emailPopup").style.display="block";

   document.getElementById("emailText").value = "";
}

function openAudit(){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    fetch("/api/audit/" + selectedTrade.tradeRef)
    .then(r=>r.json())
    .then(data=>{
        const div = document.getElementById("auditContent");
        div.innerHTML = "";

        data.forEach(a=>{
            const p = document.createElement("p");
            p.innerText = a.action + " | " + (a.details?.comment || "");
            div.appendChild(p);
        });
    });

    document.getElementById("overlay").style.display="block";
    document.getElementById("auditPopup").style.display="block";
}

async function sendEmail(){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    const text = document.getElementById("emailText").value;

    if(!text || text.trim() === ""){
        alert("Email content required");
        return;
    }

    console.log("Email sent for:", selectedTrade.tradeRef);
    console.log("Message:", text);

// ✅ Send email ONLY (no lifecycle change)
await fetch("/api/conversation/send", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
        tradeRef: selectedTrade.tradeRef,
        sender: "USER",
        message: text
    })
});

alert("Email sent to counterparty");

    const data = await res.json();

    if(!data.success){
        alert(data.error || "Action failed");
        return;
    }

    queue = data.trades || [];
    selectedTrade = null;

    render();
    renderDeskActions();

    alert("Email sent & trade moved to Liaising with CPTY");

    document.getElementById("emailText").value = "";
    closePopup();
}

function openSearch(){
    document.getElementById("overlay").style.display="block";
    document.getElementById("searchPopup").style.display="block";
	document.getElementById("searchResults").innerText = "Search not implemented yet";
}

// =====================================================
// 🔧 TEMP: SIMULATE BUTTON (FO RESPONSE SIMULATION)
// -----------------------------------------------------
// This function simulates FO response for testing only.
// It sets foResponseReceived = true and allows validation.
// ⚠️ REMOVE once AI / communication engine is implemented.
// =====================================================
async function simulateFO(){

    if(!selectedTrade){
        alert("Select trade first");
        return;
    }

    const currentRef = selectedTrade.tradeRef;

    const res = await fetch("/api/trade/action",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            trade:selectedTrade,
            action:"SIMULATE_FO_RESPONSE",
            userId,
            comment:"FO response simulated"
        })
    });

    const data = await res.json();

    if(!data.success){
        alert(data.error || "Simulation failed");
        return;
    }

    queue = data.trades || [];

    // ✅ VERY IMPORTANT: refresh selectedTrade
    selectedTrade = queue.find(t => t.tradeRef === currentRef);

    render();
    renderDeskActions();
}

let alert1hrShown = false;
let alert10minShown = false;

function handleAlerts(data){

    const mins = data.timeLeftMinutes;

    if(mins <= 60 && !alert1hrShown){
        alert("⚠️ 1 hour remaining in simulation day");
        alert1hrShown = true;
    }

    if(mins <= 10 && !alert10minShown){
        alert("⏳ 10 minutes remaining — wrap up trades");
        alert10minShown = true;
    }

    if(mins <= 0){
        alert("📛 Market Closed — Logging off");
        logout();
    }
}
</script>

</body>
</html>
