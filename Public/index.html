<!DOCTYPE html>
<html>
<head>
<title>Skillomentum Global Bank Operations Simulator</title>
<style>
body {
    font-family: Arial;
    background: #F5F7FA;
    margin: 0;
}
.topbar {
    background: #0B1F3A;
    color: white;
    padding: 24px 35px;
}
.topbar-inner {
    display: flex;
    align-items: center;
    gap: 22px;
}
.title { font-size: 26px; font-weight: 600; }

.login-box {
    width: 340px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    box-sizing: border-box;
}

.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: #FFC107;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.toggle-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #0B1F3A;
    text-decoration: underline;
    cursor: pointer;
    font-size: 14px;
}

.error-msg {
    color: red;
    font-size: 14px;
    margin-top: 10px;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-inner">
        <div class="title">Skillomentum Global Bank Operations Simulator</div>
    </div>
</div>

<div class="login-box">
    <h2 id="formTitle">Login</h2>
    
    <div id="errorMsg" class="error-msg"></div>

    <form id="authForm">
        <div id="registerFields" style="display: none;">
            <input type="text" id="fullNameInput" placeholder="Full Name">
        </div>
        <input type="email" id="emailInput" placeholder="Email Address" required>
        <input type="password" id="passwordInput" placeholder="Password" required>
        
        <button type="submit" id="submitBtn">Login</button>
    </form>

    <a class="toggle-link" id="toggleMode">Need an account? Register here</a>
</div>

<script>
console.log("Auth script loaded");

// Cookie helpers
function setCookie(name, value, maxAgeSeconds) {
    document.cookie = name + "=" + encodeURIComponent(value) + "; Path=/; Max-Age=" + maxAgeSeconds + "; SameSite=Lax";
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : null;
}

function clearCookie(name) {
    document.cookie = name + "=; Path=/; Max-Age=0; SameSite=Lax";
}

let isLoginMode = true;

const form = document.getElementById("authForm");
const formTitle = document.getElementById("formTitle");
const registerFields = document.getElementById("registerFields");
const submitBtn = document.getElementById("submitBtn");
const toggleModeBtn = document.getElementById("toggleMode");
const fullNameInput = document.getElementById("fullNameInput");
const errorMsg = document.getElementById("errorMsg");

toggleModeBtn.addEventListener("click", () => {
    isLoginMode = !isLoginMode;
    errorMsg.style.display = "none";
    
    if (isLoginMode) {
        formTitle.innerText = "Login";
        registerFields.style.display = "none";
        fullNameInput.required = false;
        submitBtn.innerText = "Login";
        toggleModeBtn.innerText = "Need an account? Register here";
    } else {
        formTitle.innerText = "Register";
        registerFields.style.display = "block";
        fullNameInput.required = true;
        submitBtn.innerText = "Register";
        toggleModeBtn.innerText = "Already have an account? Login here";
    }
});

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    errorMsg.style.display = "none";

    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    
    if (!email || !password) {
        showError("Email and password are required");
        return;
    }

    try {
        if (isLoginMode) {
            // LOGIN
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                // Store JWT token in cookie (3 hours)
                setCookie("auth_token", data.token, 3 * 60 * 60);
                sessionStorage.setItem("auth_token", data.token);
                sessionStorage.setItem("justLoggedIn", "true");

                // Navigate with userId in URL params
                window.location.href = "/dashboard.html?userId=" + encodeURIComponent(data.user.email)
                    + "&fullName=" + encodeURIComponent(data.user.fullName);
            } else {
                showError(data.error || "Login failed");
            }
        } else {
            // REGISTER
            const fullName = fullNameInput.value.trim();
            if (!fullName) {
                showError("Full Name is required for registration");
                return;
            }

            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ fullName, email, password })
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                alert("Registration successful! Please login.");
                toggleModeBtn.click(); // Switch back to login
            } else {
                showError(data.error || "Registration failed");
            }
        }
    } catch (err) {
        console.error(err);
        showError("Network error. Please try again.");
    }
});

function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.style.display = "block";
}
</script>

</body>
</html>
